name: Run Appium Tests

on:
  push:
    branches:
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  appium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Set up Java (required for Android SDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Appium CLI
        run: |
          npm install -g appium
          appium -v

      - name: Run tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          force-avd-creation: true
          disable-animations: true
          script: |
            # Start Appium server first
            nohup appium > appium.log 2>&1 &
          
            # Build project while Appium is starting
            dotnet build AppiumTests/AppiumTests.csproj --configuration Release
          
            # Wait for Appium to be ready
            i=0
            until curl -f http://localhost:4723/status; do
              i=$((i+1))
              if [ "$i" -ge 10 ]; then
                echo "Appium server did not start in time"
                exit 1
              fi
              sleep 5
            done
          
            # Run tests
            dotnet test AppiumTests/AppiumTests.csproj --configuration Release --logger "trx"
